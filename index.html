<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XAYTHEON - Collaborative Innovation Platform</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="canvas-container">
    <canvas id="three-canvas"></canvas>
    <div id="loading-screen" class="loading-screen">
      <div class="loader"></div>
      <p>Initializing XAYTHEON...</p>
    </div>
  </div>

  <div class="content">

    <nav class="navbar">
      <div class="nav-container">
        <a class="logo" href="index.html" aria-label="XAYTHEON home">
          <img class="logo-img" src="assets/logo/thelogo.png" alt="XAYTHEON logo" />
        </a>
        <ul class="nav-menu">
          <li><a class="nav-link" href="github.html">GitHub Dashboard</a></li>
          <li><a class="nav-link" href="community.html">Community Highlights</a></li>
          <li><a class="nav-link" href="explore.html">Explore by Topic</a></li>
          <li><a class="nav-link" href="contributions.html">Contributions</a></li>
        </ul>
        <button id="theme-toggle" class="btn btn-primary" style="margin: 0px !important;"></button>
      </div>
    </nav>

    <section id="home" class="hero">
      <div class="hero-content">

        <div id="xai-warning"
             style="
                display:none;
                margin-bottom:20px;
                padding:12px;
                border-radius:8px;
                background:#fff3cd;
                color:#856404;
                font-weight:bold;">
        </div>

        <h1 class="hero-title">
          <span class="title-line">Welcome to</span>
          <span class="title-main title-main--logo">
            <img src="assets/logo/thelogo.png" alt="XAYTHEON" class="title-logo-img" />
          </span>
          <span class="title-subtitle">
            Where <span class="accent-glow">INNOVATION</span> Meets
            <span class="accent-glow">COLLAB</span>ORATION
          </span>
        </h1>
        
        <button id="analyze-btn" class="btn btn-primary">
          Analyze Input
        </button>
      </div>
    </section>

    <footer class="footer">
      <div class="container">
        <div class="footer-content">
          <div class="footer-brand">
            <span class="logo-text">XAYTHEON</span>
            <p>Empowering the next generation of innovators</p>
          </div>
          <span class="footer-label">XAYTHEON</span>
        </div>
        <div class="footer-bottom">
          <p>&copy; 2025 XAYTHEON. All rights reserved.</p>
        </div>
      </div>
    </footer>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="script.js"></script>

  <script>
    const toggleBtn = document.getElementById('theme-toggle');

    const savedTheme = localStorage.getItem('theme') || 
        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');

    document.documentElement.setAttribute('data-theme', savedTheme);
    updateButtonLabel(savedTheme);

    toggleBtn.addEventListener('click', () => {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        updateButtonLabel(newTheme);
        console.log(currentTheme);
    });

    function updateButtonLabel(theme) {
        toggleBtn.innerHTML = theme === 'dark' ? '☀️' : '🌙';
    }
  </script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
        const analyzeBtn = document.getElementById("analyze-btn");
        if (analyzeBtn) {
            analyzeBtn.addEventListener("click", runPrediction);
        }
    });
  </script>
</body>
</html>
