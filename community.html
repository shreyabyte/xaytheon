<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Community Highlights — XAYTHEON</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css" />
</head>
<body class="eightgon-page">
  <div class="content">

    <!-- Navigation Bar -->
    <nav class="navbar">
      <div class="nav-container">
        <a class="logo" href="index.html" aria-label="Back to Home">
          <img class="logo-img" src="assets/logo/thelogo.png" alt="XAYTHEON logo" />
        </a>
        <ul class="nav-menu">
          <li><a class="nav-link" href="index.html">Home</a></li>
          <li><a class="nav-link" href="github.html">GitHub Dashboard</a></li>
          <li><a class="nav-link" href="explore.html">Explore by Topic</a></li>
          <li><a class="nav-link" href="contributions.html">Contributions</a></li>
        </ul>
        <button id="theme-toggle" class="btn btn-primary" style="margin:0px !important"></button>

      </div>
    </nav>

    <!-- Community Section -->
    <section class="github-section">
      <div class="container">
        <h2 class="section-title">Community Highlights</h2>

        <div class="card">
          <div class="card-header">
            <h3>Trending Repositories</h3>
          </div>
          <div class="card-body">

            <!-- Filter form -->
            <form id="trend-form" class="github-form" autocomplete="off">
              <div class="field-group" style="grid-column: span 3;">
                <label for="trend-lang">Language</label>
                <select id="trend-lang">
                  <option value="">Any</option>
                  <option>JavaScript</option>
                  <option>TypeScript</option>
                  <option>Python</option>
                  <option>Go</option>
                  <option>Rust</option>
                  <option>Java</option>
                  <option>C#</option>
                  <option>C++</option>
                </select>
              </div>
              <div class="field-group" style="grid-column: span 3;">
                <label for="trend-topic">Topic</label>
                <input id="trend-topic" type="text" placeholder="e.g. threejs, vite" />
              </div>
              <div class="field-group" style="grid-column: span 3;">
                <label for="trend-window">Time Window</label>
                <select id="trend-window">
                  <option value="7">Last 7 days</option>
                  <option value="30" selected>Last 30 days</option>
                  <option value="90">Last 90 days</option>
                </select>
              </div>
              <div class="field-group" style="grid-column: span 2;">
                <label for="trend-k">Show Top</label>
                <input id="trend-k" type="number" value="10" min="1" max="20" />
              </div>
              <button class="btn btn-primary" type="submit" style="grid-column: span 2;">Update</button>
              <button class="btn btn-outline" type="button" id="trend-reset">Reset</button>
              <div id="trend-status" class="github-status" aria-live="polite" style="grid-column: 1 / -1;"></div>
            </form>

            <!-- Results appear here -->
            <div id="trend-results" class="repo-list" style="margin-top: 20px;"></div>

          </div>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <div class="container">
        <div class="footer-content">
          <div class="footer-brand">
            <span class="logo-text">XAYTHEON</span>
            <p>Empowering the next generation of innovators</p>
          </div>
        </div>
        <div class="footer-bottom">
          <p>&copy; 2025 XAYTHEON. All rights reserved.</p>
        </div>
      </div>
    </footer>

  </div>

  <script src="community.js"></script>
  <script>
    const toggleBtn = document.getElementById('theme-toggle');

    const savedTheme = localStorage.getItem('theme') || 
        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');

    document.documentElement.setAttribute('data-theme', savedTheme);
    updateButtonLabel(savedTheme);

    toggleBtn.addEventListener('click', () => {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        updateButtonLabel(newTheme);
        console.log(currentTheme);
    });

    function updateButtonLabel(theme) {
        toggleBtn.innerHTML = theme === 'dark' ? '☀️' : '🌙';
    }
    </script>
</body>
</html>
