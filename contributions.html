<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contributions — XAYTHEON</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css" />
</head>
<body class="eightgon-page">
  <div class="content">

    <!-- Navigation Bar -->
    <nav class="navbar">
      <div class="nav-container">
        <a class="logo" href="index.html" aria-label="Back to Home">
          <img class="logo-img" src="assets/logo/thelogo.png" alt="XAYTHEON logo" />
        </a>
        <ul class="nav-menu">
          <li><a class="nav-link" href="index.html">Home</a></li>
          <li><a class="nav-link" href="github.html">GitHub Dashboard</a></li>
          <li><a class="nav-link" href="community.html">Community Highlights</a></li>
          <li><a class="nav-link" href="explore.html">Explore by Topic</a></li>
        </ul>
        <button id="theme-toggle" class="btn btn-primary" style="margin:0px important!"></button>

      </div>
    </nav>

    <!-- Contributions Section -->
    <section class="github-section">
      <div class="container">
        <h2 class="section-title">Your Open Source Contributions</h2>

        <div class="card" style="grid-column: 1 / -1;">
          <div class="card-header">
            <h3>Add a Contribution</h3>
          </div>
          <div class="card-body">

            <!-- Form to add a new contribution -->
            <form id="contrib-form" class="github-form" autocomplete="off" style="margin-bottom: 20px;">
              <div class="field-group" style="grid-column: span 4;">
                <label for="cf-project">Project Name</label>
                <input id="cf-project" type="text" placeholder="e.g. Chat-Real" required />
              </div>
              <div class="field-group" style="grid-column: span 4;">
                <label for="cf-link">Repository / PR Link</label>
                <input id="cf-link" type="url" placeholder="https://github.com/owner/repo" />
              </div>
              <div class="field-group" style="grid-column: span 4;">
                <label for="cf-program">Event / Program</label>
                <input id="cf-program" type="text" placeholder="Hacktoberfest, GSSoC, ..." />
              </div>
              <div class="field-group" style="grid-column: span 6;">
                <label for="cf-date">Date</label>
                <input id="cf-date" type="date" />
              </div>
              <div class="field-group" style="grid-column: span 6;">
                <label for="cf-type">Type</label>
                <input id="cf-type" type="text" placeholder="Bug fix, Docs, Feature, Design" />
              </div>
              <div class="field-group" style="grid-column: span 12;">
                <label for="cf-desc">Description</label>
                <input id="cf-desc" type="text" placeholder="What did you contribute?" />
              </div>
              <div class="field-group" style="grid-column: span 12;">
                <label for="cf-tech">Tech Stack</label>
                <input id="cf-tech" type="text" placeholder="React, Node, Python..." />
              </div>
              <button class="btn btn-primary" type="submit" style="grid-column: span 3;">
                Save Contribution
              </button>
              <div id="contrib-status" class="github-status" style="grid-column: 1 / -1;"></div>
            </form>

            <!-- List of saved contributions appears below the form -->
            <div id="contrib-list" class="repo-list"></div>

          </div>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <div class="container">
        <div class="footer-content">
          <div class="footer-brand">
            <span class="logo-text">XAYTHEON</span>
            <p>Empowering the next generation of innovators</p>
          </div>
        </div>
        <div class="footer-bottom">
          <p>&copy; 2025 XAYTHEON. All rights reserved.</p>
        </div>
      </div>
    </footer>

  </div>

  <script src="contributions.js"></script>
  <script>
    const toggleBtn = document.getElementById('theme-toggle');

    const savedTheme = localStorage.getItem('theme') || 
        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');

    document.documentElement.setAttribute('data-theme', savedTheme);
    updateButtonLabel(savedTheme);

    toggleBtn.addEventListener('click', () => {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        updateButtonLabel(newTheme);
        console.log(currentTheme);
    });

    function updateButtonLabel(theme) {
        toggleBtn.innerHTML = theme === 'dark' ? '☀️' : '🌙';
    }
    </script>
</body>
</html>
